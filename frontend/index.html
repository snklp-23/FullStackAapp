<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UserVault — 3-Tier App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1c1c28;
      --border: #2a2a3d;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --accent3: #43e8d8;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --success: #43e8a0;
      --error: #ff5e7d;
      --radius: 14px;
      --shadow: 0 8px 32px rgba(108,99,255,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 0 48px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-text p {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .status-dot.offline { background: var(--error); }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }

    .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 60px; height: 60px;
      border-radius: 0 0 0 60px;
      opacity: 0.12;
    }

    .stat-card:nth-child(1)::after { background: var(--accent); }
    .stat-card:nth-child(2)::after { background: var(--accent2); }
    .stat-card:nth-child(3)::after { background: var(--accent3); }

    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; }
    .stat-card:nth-child(1) .stat-value { color: var(--accent); }
    .stat-card:nth-child(2) .stat-value { color: var(--accent2); }
    .stat-card:nth-child(3) .stat-value { color: var(--accent3); }

    /* Main layout */
    .main-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }

    /* Form Card */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }

    select option { background: var(--surface); }

    .btn {
      width: 100%;
      padding: 13px 20px;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9b93ff);
      color: white;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,99,255,0.3); }

    .btn-danger {
      background: transparent;
      border: 1px solid var(--error);
      color: var(--error);
      width: auto;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
    }

    .btn-edit {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      width: auto;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
    }

    .btn-cancel {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      margin-top: 10px;
    }

    /* Table Card */
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 13px;
      width: 200px;
      outline: none;
    }

    .search-input:focus { border-color: var(--accent); }

    table { width: 100%; border-collapse: collapse; }

    th {
      text-align: left;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    td {
      padding: 14px 20px;
      font-size: 14px;
      border-bottom: 1px solid rgba(42,42,61,0.5);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: rgba(108,99,255,0.04); }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: white;
    }

    .user-cell { display: flex; align-items: center; gap: 12px; }

    .role-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
    }

    .role-Admin { background: rgba(108,99,255,0.15); color: var(--accent); border: 1px solid rgba(108,99,255,0.3); }
    .role-User { background: rgba(67,232,216,0.1); color: var(--accent3); border: 1px solid rgba(67,232,216,0.2); }
    .role-Manager { background: rgba(255,101,132,0.1); color: var(--accent2); border: 1px solid rgba(255,101,132,0.2); }

    .actions { display: flex; gap: 8px; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* Toast */
    .toast {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      min-width: 280px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      font-size: 14px;
    }

    .toast.show { transform: translateX(0); }
    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--error); }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .main-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🗄️</div>
      <div class="logo-text">
        <h1>UserVault</h1>
        <p>3-Tier Architecture · AWS RDS MySQL</p>
      </div>
    </div>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Users</div>
      <div class="stat-value" id="totalUsers">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Admins</div>
      <div class="stat-value" id="totalAdmins">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Last Added</div>
      <div class="stat-value" id="lastAdded" style="font-size:14px;padding-top:10px;">—</div>
    </div>
  </div>

  <!-- Main Grid -->
  <div class="main-grid">

    <!-- Form -->
    <div class="form-card">
      <div class="card-title">
        <span id="formTitle">Add New User</span>
      </div>
      <input type="hidden" id="editId" />

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Jane Doe" />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="jane@example.com" />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="role">
          <option value="User">User</option>
          <option value="Admin">Admin</option>
          <option value="Manager">Manager</option>
        </select>
      </div>

      <button class="btn btn-primary" id="submitBtn" onclick="submitForm()">Add User</button>
      <button class="btn btn-cancel" id="cancelBtn" onclick="cancelEdit()" style="display:none;">Cancel Edit</button>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-header">
        <div class="card-title" style="margin:0">
          <span>Users</span>
        </div>
        <input class="search-input" type="text" placeholder="🔍  Search..." oninput="filterTable(this.value)" />
      </div>
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Email</th>
            <th>Role</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span id="toastIcon">✅</span>
  <span id="toastMsg">Success</span>
</div>

<script>
  // ============================================================
  // 🔧 REPLACE WITH YOUR BACKEND API URL
  // If running locally: http://localhost:5000
  // If deployed: http://YOUR_EC2_PUBLIC_IP:5000 or your domain
  // ============================================================
  const API_BASE = '/api';
  // ============================================================

  let allUsers = [];

  async function checkHealth() {
    try {
      const res = await fetch(`${API_BASE}/health`);
      const data = await res.json();
      if (data.status === 'OK') {
        document.getElementById('statusDot').className = 'status-dot online';
        document.getElementById('statusText').textContent = 'Connected';
      }
    } catch {
      document.getElementById('statusDot').className = 'status-dot offline';
      document.getElementById('statusText').textContent = 'Disconnected';
    }
  }

  async function fetchUsers() {
    try {
      const res = await fetch(`${API_BASE}/users`);
      const data = await res.json();
      if (data.success) {
        allUsers = data.data;
        renderTable(allUsers);
        updateStats(allUsers);
      }
    } catch (err) {
      showToast('Failed to fetch users', 'error');
    }
  }

  function updateStats(users) {
    document.getElementById('totalUsers').textContent = users.length;
    document.getElementById('totalAdmins').textContent = users.filter(u => u.role === 'Admin').length;
    if (users.length > 0) {
      document.getElementById('lastAdded').textContent = users[0].name;
    }
  }

  function renderTable(users) {
    const tbody = document.getElementById('userTableBody');
    if (!users.length) {
      tbody.innerHTML = `
        <tr><td colspan="5">
          <div class="empty-state">
            <div class="icon">📭</div>
            <p>No users yet. Add one to get started.</p>
          </div>
        </td></tr>`;
      return;
    }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td>
          <div class="user-cell">
            <div class="avatar">${u.name.charAt(0).toUpperCase()}</div>
            <strong>${escHtml(u.name)}</strong>
          </div>
        </td>
        <td style="color:var(--muted)">${escHtml(u.email)}</td>
        <td><span class="role-badge role-${u.role}">${u.role}</span></td>
        <td style="color:var(--muted);font-size:12px">${new Date(u.created_at).toLocaleDateString()}</td>
        <td>
          <div class="actions">
            <button class="btn btn-edit" onclick="editUser(${u.id})">Edit</button>
            <button class="btn btn-danger" onclick="deleteUser(${u.id})">Delete</button>
          </div>
        </td>
      </tr>`).join('');
  }

  function filterTable(q) {
    const filtered = allUsers.filter(u =>
      u.name.toLowerCase().includes(q.toLowerCase()) ||
      u.email.toLowerCase().includes(q.toLowerCase()) ||
      u.role.toLowerCase().includes(q.toLowerCase())
    );
    renderTable(filtered);
  }

  async function submitForm() {
    const id = document.getElementById('editId').value;
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const role = document.getElementById('role').value;

    if (!name || !email) { showToast('Name and email are required', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.innerHTML = '<span class="loading"></span>';
    btn.disabled = true;

    try {
      const url = id ? `${API_BASE}/users/${id}` : `${API_BASE}/users`;
      const method = id ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, role })
      });
      const data = await res.json();

      if (data.success) {
        showToast(id ? 'User updated!' : 'User added!', 'success');
        cancelEdit();
        fetchUsers();
      } else {
        showToast(data.message, 'error');
      }
    } catch {
      showToast('Request failed', 'error');
    }

    btn.textContent = id ? 'Update User' : 'Add User';
    btn.disabled = false;
  }

  async function editUser(id) {
    const user = allUsers.find(u => u.id === id);
    if (!user) return;
    document.getElementById('editId').value = user.id;
    document.getElementById('name').value = user.name;
    document.getElementById('email').value = user.email;
    document.getElementById('role').value = user.role;
    document.getElementById('formTitle').textContent = 'Edit User';
    document.getElementById('submitBtn').textContent = 'Update User';
    document.getElementById('cancelBtn').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    document.getElementById('editId').value = '';
    document.getElementById('name').value = '';
    document.getElementById('email').value = '';
    document.getElementById('role').value = 'User';
    document.getElementById('formTitle').textContent = 'Add New User';
    document.getElementById('submitBtn').textContent = 'Add User';
    document.getElementById('cancelBtn').style.display = 'none';
  }

  async function deleteUser(id) {
    if (!confirm('Delete this user?')) return;
    try {
      const res = await fetch(`${API_BASE}/users/${id}`, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) { showToast('User deleted', 'success'); fetchUsers(); }
    } catch {
      showToast('Delete failed', 'error');
    }
  }

  function showToast(msg, type='success') {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    document.getElementById('toastIcon').textContent = type === 'success' ? '✅' : '❌';
    toast.className = `toast ${type} show`;
    setTimeout(() => { toast.className = `toast ${type}`; }, 3000);
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  checkHealth();
  fetchUsers();
  setInterval(checkHealth, 30000);
</script>
</body>
</html>
